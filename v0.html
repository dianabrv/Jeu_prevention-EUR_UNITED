<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Jeu Interactif Brouillon</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f8ff; }
        h1 { color: #333; }
        #conteneur-jeu { position: relative; display: inline-block; margin-top: 20px; }
        #image-fond { max-width: 100%; height: auto; border: 5px solid #ddd; border-radius: 10px; }

        /* Style commun pour les zones cliquables (invisibles) */
        .zone-cliquable {
            position: absolute;
            cursor: pointer;
            /* Pour les voir pendant le développement, enlève le commentaire ci-dessous : */
            /* background-color: rgba(255, 0, 0, 0.3); border: 2px solid red; */
        }
    </style>
</head>
<body>

    <h1>Aide le petit patient !</h1>
    <p>Clique sur les objets pour interagir.</p>

    <div id="conteneur-jeu">
        <img src="image_fond.png" id="image-fond" alt="Image d'un patient à l'hôpital">

        <div class="zone-cliquable" onclick="clicMasque()" style="top: 38%; left: 41%; width: 18%; height: 16%;"></div>
        <div class="zone-cliquable" onclick="clicDoudou()" style="top: 55%; left: 10%; width: 15%; height: 25%;"></div>
    </div>

    <script>
        // Fonctions JavaScript déclenchées par les clics
        function clicMasque() {
            alert("Bravo ! Le patient garde bien son masque pour se protéger.");
        }

        function clicDoudou() {
            alert("Oh ! C'est son doudou préféré. Il se sent rassuré.");
        }
    </script>

</body>
</html>
